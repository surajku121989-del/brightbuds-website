<style>
*{
        margin:0;
            padding:0;
                box-sizing:border-box;
                    font-family:'Poppins', sans-serif;

body{
        background:#111;
            color:#fff;
}

header{
        text-align:center;

}

.section{
        padding:60px 20px;
            text-align:center;
}

.video-grid{
        display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
                gap:30px;
                    max-width:1200px;
                        margin:auto;
}

.video-card{
        position:relative;
            cursor:pointer;
                border-radius:15px;
                    overflow:hidden;
                        box-shadow:0 10px 25px rgba(0,0,0,0.5);
                            transition:0.3s;
}

.video-card:hover{
        transform:scale(1.05);
}

.video-card img{
        width:100%;
            display:block;
}

.play-btn{
        position:absolute;
            top:50%;
                left:50%;
                    transform:translate(-50%,-50%);
                        width:70px;
                            height:70px;
                                background:rgba(255,0,0,0.8);
                                    border-radius:50%;
                                        display:flex;
                                            justify-content:center;
                                                align-items:center;
                                                    font-size:30px;
                                                        color:#fff;
}

iframe{
        width:100%;
            height:220px;
                border:none;
}

footer{
        text-align:center;
            padding:30px;
                margin-top:40px;
                    background:#000;
}
</style>
</head>
