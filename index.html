<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Buds Stories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
    overflow-x:hidden;
}

/* 🔥 LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loader-circle{
    width:60px;
    height:60px;
    border:6px solid #333;
    border-top:6px solid #ff0000;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* 🔥 HEADER */
header{
    text-align:center;
    padding:70px 20px;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

header h1{
    font-size:42px;
    font-weight:700;
    letter-spacing:2px;
    animation:fadeInDown 1.5s ease;
}

header p{
    margin-top:15px;
    font-size:18px;
    opacity:0.9;
}

@keyframes fadeInDown{
    from{opacity:0;transform:translateY(-30px);}
    to{opacity:1;transform:translateY(0);}
}

.section{
    padding:60px 20px;
    text-align:center;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    max-width:1200px;
    margin:auto;
}

.video-card{
    position:relative;
    cursor:pointer;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    transition:0.3s;
}

.video-card:hover{
    transform:scale(1.05);
}

.video-card img{
    width:100%;
    display:block;
}

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    background:rgba(255,0,0,0.8);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#fff;
}

iframe{
    width:100%;
    height:220px;
    border:none;
}

footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    background:#000;
}

/* fade out loader */
.hide{
    display:none;
}
</style>
</head>
<body>

<!-- 🔥 Loading Screen -->
<div id="loader">
    <div class="loader-circle"></div>
    <h2>Loading Bright Buds Stories...</h2>
</div>

<header>
    <h1>Bright Buds Stories</h1>
    <p>Fun & Magical Kids Animation World ✨</p>
</header>

<section class="section">
    <h2>🎬 My Animation Videos</h2>

    <div class="video-grid">

        <div class="video-card" onclick="loadVideo(this,'vUZ6uK6PGoE')">
            <img src="https://img.youtube.com/vi/vUZ6uK6PGoE/hqdefault.jpg">
            <div class="play-btn">▶</div>
        </div>

        <div class="video-card" onclick="loadVideo(this,'PvggY59szPQ')">
            <img src="https://img.youtube.com/vi/PvggY59szPQ/hqdefault.jpg">
            <div class="play-btn">▶</div>
        </div>

        <div class="video-card" onclick="loadVideo(this,'h0F3mbed1QM')">
            <img src="https://img.youtube.com/vi/h0F3mbed1QM/hqdefault.jpg">
            <div class="play-btn">▶</div>
        </div>

        <div class="video-card" onclick="loadVideo(this,'mPJoCxIw2so')">
            <img src="https://img.youtube.com/vi/mPJoCxIw2so/hqdefault.jpg">
            <div class="play-btn">▶</div>
        </div>

    </div>
</section>

<footer>
    © 2026 Bright Buds Stories
</footer>

<script>
let currentPlayer = null;

function loadVideo(element, videoId){

    // stop previous video
    if(currentPlayer){
        currentPlayer.innerHTML = currentPlayer.getAttribute("data-thumbnail");
    }

    // save thumbnail to restore later
    element.setAttribute("data-thumbnail", element.innerHTML);

    element.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>
    `;

    currentPlayer = element;
}

// loader hide after page load
window.addEventListener("load", function(){
    document.getElementById("loader").classList.add("hide");
});
</script>

</body>
</html>
