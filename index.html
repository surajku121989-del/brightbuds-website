<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Buds Stories | Animation Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(-45deg,#6a11cb,#2575fc,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
    color:#fff;
}

/* 🌈 Animated Background */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 🔥 Loading Screen */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:700;
    z-index:9999;
    letter-spacing:2px;
}

.fade-out{
    opacity:0;
    visibility:hidden;
    transition:1s;
}

/* HEADER */
header{
    text-align:center;
    padding:60px 20px 30px;
}

.logo{
    font-size:38px;
    font-weight:700;
    animation:popIn 1.5s ease;
}

@keyframes popIn{
    0%{transform:scale(0);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

.subscribe-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background:#ff0000;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.subscribe-btn:hover{
    background:#cc0000;
    transform:scale(1.1);
}

/* VIDEO SECTION */
.section{
    padding:60px 20px;
    text-align:center;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    max-width:1200px;
    margin:auto;
}

.video-card{
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    transition:0.4s;
}

.video-card:hover{
    transform:translateY(-10px) scale(1.05);
}

.video-card iframe{
    width:100%;
    height:220px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    margin-top:50px;
}

</style>
</head>
<body>

<div id="loader">Bright Buds Stories</div>

<header>
    <div class="logo">Bright Buds Stories ✨</div>
    <p>Fun & Magical Kids Animation Studio</p>
    <a href="https://youtube.com/@brightbudsstories" target="_blank" class="subscribe-btn">Subscribe Now</a>
</header>

<section class="section">

<div class="video-grid">

allow="autoplay; encrypted-media" allowfullscreen></iframe>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let players = [];

function onYouTubeIframeAPIReady() {
    document.querySelectorAll("iframe").forEach((iframe, index) => {
        players[index] = new YT.Player(iframe, {
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    });
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        players.forEach(player => {
            if (player !== event.target) {
                player.pauseVideo();
            }
        });
    }
}

window.addEventListener("load", function(){
    document.getElementById("loader").classList.add("fade-out");
});
</script>
